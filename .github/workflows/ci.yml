name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print versions
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift / freezed / riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze (includes layer-import lint)
        run: flutter analyze

      - name: Check layer imports
        run: bash tool/check_layer_imports.sh

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Coverage summary & thresholds
        run: dart run tool/check_coverage.dart coverage/lcov.info

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lcov-coverage
          path: coverage/lcov.info
          if-no-files-found: ignore
